  content: EUphisto thanks for the comments<br/><br/>Your basic arguement seems to be that if christians were in the mainstream they would have to remain independant in order to be able to preach.<br/><br/>You argue that if they were signed to a mainstream label then they would not have artistic freedom to sing explicitly about God.<br/><br/>I kinda agree.<br/><br/>Therefore the Christian Music Industry should be dismantled as soon as possible.<br/><br/>If God in everything christians seem to think he is then why do christians try create an place for him in the market. <br/><br/>Are you saying that the christian god would not onour those who stand up for him somehow, someway. fiery furnace anyone? lions den anyone?<br/><br/>there can be no such thing as christian Rock.<br/>DOn't try and sell me music on the premise it's Christian Rock. I want music thats good, not overbrnaded with religiousity.
