  content: I think where I would disagree with you would be in the fact that you say that basic "Christian music", or what we refer to by that name, is wrong because it is released both on a level that is simple, and on a level that is commercial. I personally find nothing wrong with either of those traits, I admire someone who is able to write a commercially good song. And I think that for most people, basic truth is what they can relate to on an everyday basis. Most people don't have the time or mental resources to take an Over the Rhine or Sufjan Stevens song and disect it, and try to understand it. When I hear the song 'Who Am I', by Casting Crowns, I don't say that it's a faulty song because it's simple. I am able to relate to it and say, yes, I am Christ's, He has claimed me! That claim, or understanding, no matter how basic it is, still greatly encourages me.<br/>I will put a disclaimer here by saying I am the type of person who likes disecting intellectually challenging songs, and I myself enjoy especially OTR, but I don't only need the truth I find in them. I also need simple truth. As a matter of fact, Over the Rhine (and etc.) does not give me spiritual 'Christian' encouragement anymore than many secular songs do. I will give that maybe a few do, but most of the songs must be understood from a subtle, yet open-minded spirituality, not the basic Gospel message of Jesus Christ.
