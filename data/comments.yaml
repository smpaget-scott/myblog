  content: I think that "way of darkness" is a bad way of talking about the apophatic tradition. More usually, it's talked about as the way of emptying or the way of negation. The idea is that it is impossible for us to say anything definitive about God - all our best endeavours are hedged around with cautions and approximations. By contrast, the apophatic method is to talk about what God is <i>not</i>, rather than what God <i>is</i>. So, God is not evil, God is not physical, God is not limited, God is not human and so on.<br/><br/>pax et bonum
