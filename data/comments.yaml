  parent_id: "0"
  content: I probably agree with you more than you know. I also dislike much of what goes on in the industry, a lot of it is very superficial, fake, etc. <br/>Personally, I think U2, Over The Rhine, and etc. make better examples of Christian bands in many respects than many 'Christian Contemporary' bands.<br/>I do know, though, through experience (I lived in Nashville, TN for a short time) that there are a lot of really sincere people in the industry who simply want to preach the gospel as possible. Of course that's not always the case, but lots of Christians there don't care whether you see it as Christian Contemporary Music or just as music, they just want to share their heart. It's unfortunate what's become of the industry in recent years, but we shouldn't throw the baby out with the bathwater.<br/>As a side note:<br/>I don't think artists are saying that their music is 'Christian' music, in many cases, but rather contains explicitly Christian lyrics. It would be deceiving the listener not at least give them some sort of warning about the content of the song, if someone's going to be preachy on an album, I'd like an indication. Calling it a Christian album may not be the best use of the word, but it does give me some idea of the content.<br/>One thing that is an absolute "Don't" in the music industry, don't trick your audience. If it's explicitly Christian lyrics, be honest about the way you present it. If it's not, be honest about that too. Music is a very sensitve business, those among us who are in it need to be very careful how we present ourselves, and label our material accordingly.
