  content: It comes across as callous, to me. I understand this world is not a conclusion. But the tension of the now and not yet is in the ability to live in the now, react and deal with life now. Metz's Dangerous memory idea asks questions of this, arguing that theology needs to be able to speak a truth that takes account of and is shaped by the facts of unimaginable horror which are happening to people. Theology can not be a power play of everything is alright, because it not.
