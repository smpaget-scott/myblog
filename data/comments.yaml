  content: eucharisto. I think we have crossed wires here. <br/>Simple music isn't bad, in fact, in my brief song writing experience, it is very hard to write a simple song which is good.<br/><br/>COmmericial music by defination must be popular, there fore people will like it. Last year I totally feel for britney's Toxic. Commerical yes, popular yes, sold to me on a premise which was false. no.<br/><br/>Christian music is guarunteed sales not because it is commercial, not because it is simple, but because it trades off the name "Christian". <br/>Later this year Micheal W Smith will be selling out the royal albert hall in London.<br/><br/>Not bacause he has had a commerical british hit. (Although I will grant you he did get to number 22 in 1992). Not because his songs are simple. Not because he has a film coming out in america this year. But because people buy his music because he is sold in the christian Music Industry.<br/><br/>If people want to sing praises to God, Fantastic, biblical, great. Just do it properly. Sell it as religious music for praise.<br/><br/>If you want to write a song about How God works in Mysterious ways. excellent. <br/>Write a song about it. <br/>Gig for ages until the band rocks.<br/>get proper management.<br/>get signed to a label and put the best you have out there against the best that pink floyd, the killers, razorlight, U2, or anyone has to offer.<br/><br/>I object to being sold something because it is christian.<br/>I want to be free to judge music as an art form.<br/><br/>I want to be aable to judge things against each other equally. <br/><br/>If I buy a picture to go on my wall,My choice may be between, Da Vinci's sunflowers or david from the roof of the Cistine chapel. <br/><br/>I buy the one I ilke the best, not the one sold to me as christian.<br/><br/>I think that should make it slightly clearer. if not more confusing.
  post_url: /blog/christian-rock/
  post_id: "264"
- id: "30"
  author_name: eucharisto
  author_email: ""
  author_url: ""
  published: 2005-08-07T22:45:00Z
  parent_id: "0"
  content: I don't find anything wrong with the idea of Christians reaching to Christians through a commercial market. It's called edifying the body. I also don't mind Christians working in a secular market, if that's what God's called them to.<br/>Frankly, a song that preaches the Gospel plain and clear, like Michael W. Smith song (an artist you used earlier), simply wouldn't be possible in a secular market. It's unreal to think that someone could present a CD with a clear and undeniable message of the Gospel on it, and then expect a label like Capital or Virgin to pick it up. Granted, there are some exceptions, but I'm not talking about Over The Rhine or U2, who's message, though good and thought-provoking, is not a blatant message of the Gospel of Jesus Christ.<br/>Unless an artist goes independent like Over The Rhine, they buy into a system. U2 buys into an industry just as much as Michael W. Smith does. Every artist that gets signed is molded into whatever the record company wants. For example, Universal Music International, U2's record company, knows what sells and what doesn't sell. Believe it or not, the record company decides much of what does or doesn't go on the record. Bono can't just write what he wants, he writes in accordance to the precedents set out by Universal. For example, he may have earned the right to write the song 'Yahweh', and record it on a full-lenth record, but partially the reason he can record that song is because though it means something to us as Christians, it goes right over the top of a non-Christian's head. Most non-Christians don't even have any idea what yahweh is. A seattle DJ was actually previewing the song and wondered out loud why Bono would name a song 'Yeah Way'!<br/>Anyway, if you truly think that<br/>1) It's ok for Christians to write straightforward, 'simple', 'commerical' songs, but<br/>2) It's not ok for Christians to be part of a Christian industry, you're condemning Christian Songwriters to being independent their entire careers. I have yet to see the day that a person who gets signed by a major secular record label and gets to regularly preach the gospel.<br/>I would say that I have been to concerts by Jars Of Clay, Newsboys, etc., and seen non-Christians repent and come to Christ. I have also seen secular venues where a Christian-by-name,-not-by-industry gives a concert, and doesn't change a single person. This is not to say that there aren't exceptions, but on the whole, the only thing a Christian in a secular field can do is pre-evangelise, lay the groundwork. Don't get me wrong, this is important too, but so is evangelising through the simple message of the gospel.<br/>The Christian industry provides a place where the Gospel can be preached, and I guarentee you, non-Christians are hearing it.<br/>To 'destroy' it, as I've heard some people say, would be to destroy a good thing that God is working through.
